server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: coldchain-compliance
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:coldchain}
    username: ${DB_USER:coldchain}
    password: ${DB_PASSWORD:coldchain_2026}
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
      connection-timeout: 5000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    root: INFO
    com.coldchain.compliance: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

# 业务配置
coldchain:
  # RSA 签名密钥路径
  signature:
    key-dir: ${SIG_KEY_DIR:/data/keys}
  # WORM 存储：是否禁止 UPDATE/DELETE
  worm:
    enforce: true
  # 审计引擎：单任务判定超时（毫秒）
  audit:
    timeout-ms: 5000
  # 飞检导出临时目录
  export:
    temp-dir: ${EXPORT_TEMP_DIR:/data/exports}
  # JWT 配置
  jwt:
    secret: ${JWT_SECRET:flight_inspection_gxp_compliance_secret_2026_very_long_key}
    expiration-ms: 86400000
